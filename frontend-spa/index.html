<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>E-Inventory System - Premium Dark</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0F172A',
            darkcard: '#1E293B',
            darkborder: '#334155'
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    body { background-color: #0F172A; color: #F1F5F9; font-family: 'Inter', sans-serif; }

    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ===================== PAGE TRANSITION ===================== */
    .page-enter-active {
      animation: pageSlideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .page-leave-active {
      animation: pageSlideOut 0.25s ease-in forwards;
    }
    @keyframes pageSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pageSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }

    /* ===================== CARD ENTRANCE (staggered) ===================== */
    .card-anim {
      opacity: 0;
      animation: cardFadeUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .card-anim:nth-child(1) { animation-delay: 0.05s; }
    .card-anim:nth-child(2) { animation-delay: 0.15s; }
    .card-anim:nth-child(3) { animation-delay: 0.25s; }
    .card-anim:nth-child(4) { animation-delay: 0.35s; }
    .card-anim:nth-child(5) { animation-delay: 0.45s; }
    .card-anim:nth-child(6) { animation-delay: 0.55s; }
    @keyframes cardFadeUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ===================== HERO ENTRANCE ===================== */
    .hero-icon-anim {
      animation: heroPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .hero-title-anim {
      opacity: 0;
      animation: heroFade 0.7s ease forwards 0.2s;
    }
    .hero-desc-anim {
      opacity: 0;
      animation: heroFade 0.7s ease forwards 0.4s;
    }
    .hero-btn-anim {
      opacity: 0;
      animation: heroFade 0.7s ease forwards 0.6s;
    }
    @keyframes heroPop {
      from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }
    @keyframes heroFade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===================== SECTION TITLE ===================== */
    .section-title-anim {
      opacity: 0;
      animation: sectionIn 0.6s ease forwards 0.1s;
    }
    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===================== MODAL ANIMATIONS ===================== */
    @keyframes modalOverlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(-24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }
    .modal-overlay-anim { animation: modalOverlayIn 0.25s ease forwards; }
    .modal-card-anim    { animation: modalSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* ===================== HOVER LIFT ===================== */
    .hover-lift {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .hover-lift:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    /* ===================== NAV LINK UNDERLINE ===================== */
    .nav-link-anim {
      position: relative;
    }
    .nav-link-anim::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 50%;
      width: 0; height: 2px;
      background: #818cf8;
      border-radius: 99px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-link-anim:hover::after {
      width: 80%; left: 10%;
    }

    /* ===================== PULSE GLOW ===================== */
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(99,102,241,0.3); }
      50%       { box-shadow: 0 0 28px rgba(99,102,241,0.7); }
    }
    .pulse-glow { animation: pulseGlow 2.5s ease-in-out infinite; }

    /* ===================== SPINNER ===================== */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spin-anim { animation: spin 1s linear infinite; }

    /* ===================== FLOAT ===================== */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-darkbg text-slate-200 min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

  <div id="app"></div>

  <!-- Libraries -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Inisialisasi animasi AOS secara global
    document.addEventListener('DOMContentLoaded', function() {
      AOS.init({
        duration: 800,
        once: true,
        offset: 50,
      });
    });
  </script>

  <!-- Components -->
  <script src="components/Navbar.js?v=12"></script>
  <script src="components/Home.js?v=12"></script>
  <script src="components/Login.js?v=12"></script>
  <script src="components/Dashboard.js?v=12"></script>
  <script src="components/Kategori.js?v=12"></script>
  <script src="components/Supplier.js?v=12"></script>
  <script src="components/Barang.js?v=12"></script>
  <script src="components/Transaksi.js?v=12"></script>
  <script src="components/App.js?v=12"></script>

</body>
</html>
